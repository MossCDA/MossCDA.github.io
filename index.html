<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moss · OSINT & Sécurité</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05050e;
      color: #c090f0;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow-x: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(144,80,208,0.3), transparent);
      animation: scan 7s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes scan { from { top: 0 } to { top: 100vh } }

    .terminal {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 720px;
    }

    /* Header barre terminal */
    .term-header {
      background: #0d0d20;
      border: 1px solid #1e1535;
      border-bottom: none;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff3b30; }
    .dot-y { background: #ffcc00; }
    .dot-g { background: #28cd41; }
    .term-title {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 3px;
      color: #3a2a5a;
    }

    /* Corps terminal */
    .term-body {
      background: #03030a;
      border: 1px solid #1e1535;
      padding: 28px 32px 40px;
      min-height: 420px;
      position: relative;
    }

    .line {
      margin-bottom: 6px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt { color: #5a2a90; }
    .cmd    { color: #e0d0f8; }
    .output { color: #7050a0; }
    .val    { color: #c090f0; }
    .hi     { color: #f0e0ff; font-weight: bold; }
    .gold   { color: #c8a84a; }
    .green  { color: #40d080; }
    .red    { color: #ff4060; }
    .dim    { color: #2a1a4a; }
    .sep    { color: #1e1535; }

    /* Curseur */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background: #9050d0;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Invisible pour le typage */
    .hidden { visibility: hidden; }

    /* Coins décoratifs */
    .corner {
      position: absolute;
      width: 12px; height: 12px;
      border-color: #2a1a4a; border-style: solid;
    }
    .c-tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    .c-tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
    .c-bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
    .c-br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

    /* Footer */
    .term-footer {
      border: 1px solid #1e1535;
      border-top: none;
      background: #0d0d20;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-status {
      font-size: 9px;
      letter-spacing: 2px;
      color: #3a2a5a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #40d080;
      animation: blink 2s ease-in-out infinite;
    }
    .footer-links {
      display: flex;
      gap: 20px;
    }
    .footer-links a {
      font-size: 9px;
      letter-spacing: 2px;
      color: #5a3a8a;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: #c090f0; }
  </style>
</head>
<body>

<div class="terminal">

  <div class="term-header">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <div class="term-title">CASSANDRE TERMINAL · SESSION ACTIVE</div>
  </div>

  <div class="term-body">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div id="output"></div>
    <div id="cursor-line"><span class="cursor"></span></div>
  </div>

  <div class="term-footer">
    <div class="footer-status">
      <div class="status-dot"></div>
      MISTRAL 7B · LOCAL · SOUVERAIN
    </div>
    <div class="footer-links">
      <a href="https://github.com/MossCDA/Cassandre" target="_blank">CASSANDRE</a>
      <a href="https://github.com/MossCDA/VoxReport" target="_blank">VOXREPORT</a>
      <a href="https://github.com/MossCDA" target="_blank">GITHUB</a>
    </div>
  </div>

</div>

<script>
const out = document.getElementById('output');
const cursorLine = document.getElementById('cursor-line');

// ── Séquence du terminal ─────────────────────────────────────────────────────
const SEQUENCE = [
  { type: 'prompt', text: 'CASSANDRE > ', cmd: 'IDENTIFY OPERATOR', delay: 600 },
  { type: 'output', lines: [
    { cls: 'dim',    text: '─────────────────────────────────────────' },
    { cls: 'output', text: '  NOM           ' },{ cls: 'hi', text: 'El mohcine Schamel  ·  "Moss"' },
    { cls: 'output', text: '  FORMATION     ' },{ cls: 'val', text: 'CDA · RNCP Niveau 6' },
    { cls: 'output', text: '  SPÉCIALITÉ    ' },{ cls: 'gold', text: 'OSINT & Sécurité · Outils opérationnels' },
    { cls: 'output', text: '  BACKGROUND    ' },{ cls: 'val', text: '13e RDP · Télécoms · Logistique · Usinage' },
    { cls: 'output', text: '  DISPONIBLE    ' },{ cls: 'green', text: 'Stage août 2026' },
    { cls: 'dim',    text: '─────────────────────────────────────────' },
  ], delay: 80 },

  { type: 'blank', delay: 500 },

  { type: 'prompt', text: 'CASSANDRE > ', cmd: 'LIST PROJECTS', delay: 400 },
  { type: 'output', lines: [
    { cls: 'dim',    text: '─────────────────────────────────────────' },
    { cls: 'gold',   text: '  [01] CASSANDRE' },
    { cls: 'output', text: '       Open Source Signal Intelligence' },
    { cls: 'val',    text: '       Node.js · Mistral 7B · SQLite · Leaflet' },
    { cls: 'output', text: '       40+ sources · IA locale · Air Gap · 4 661 signaux' },
    { cls: 'dim',    text: '' },
    { cls: 'gold',   text: '  [02] VOXREPORT' },
    { cls: 'output', text: '       Rapport vocal numérique' },
    { cls: 'val',    text: '       PHP MVC · MySQL · Web Speech API · FPDF' },
    { cls: 'output', text: '       Dictée vocale · Signature électronique · Multi-rôles' },
    { cls: 'dim',    text: '─────────────────────────────────────────' },
  ], delay: 60 },

  { type: 'blank', delay: 500 },

  { type: 'prompt', text: 'CASSANDRE > ', cmd: 'SHOW STACK', delay: 400 },
  { type: 'output', lines: [
    { cls: 'dim',    text: '─────────────────────────────────────────' },
    { cls: 'output', text: '  BACKEND   ' },{ cls: 'val', text: 'Node.js  PHP  SQLite  MySQL  REST API' },
    { cls: 'output', text: '  FRONTEND  ' },{ cls: 'val', text: 'HTML/CSS/JS  Leaflet.js  Chart.js' },
    { cls: 'output', text: '  IA        ' },{ cls: 'val', text: 'Mistral 7B  Ollama  OSINT  NLP' },
    { cls: 'output', text: '  OUTILS    ' },{ cls: 'val', text: 'Git  Docker  Puppeteer  Linux' },
    { cls: 'dim',    text: '─────────────────────────────────────────' },
  ], delay: 60 },

  { type: 'blank', delay: 500 },

  { type: 'prompt', text: 'CASSANDRE > ', cmd: 'DETECT SIGNAL --zone=COVID-19 --date=2020-01', delay: 600 },
  { type: 'output', lines: [
    { cls: 'dim',    text: '─────────────────────────────────────────' },
    { cls: 'red',    text: '  ⚠  SIGNAL DÉTECTÉ' },
    { cls: 'output', text: '  Zone         ' },{ cls: 'val', text: 'Wuhan, Chine' },
    { cls: 'output', text: '  Date         ' },{ cls: 'val', text: 'Janvier 2020' },
    { cls: 'output', text: '  Source       ' },{ cls: 'val', text: 'Forum jeux vidéo (source ouverte)' },
    { cls: 'output', text: '  Alerte off.  ' },{ cls: 'red', text: 'Inexistante à cette date' },
    { cls: 'output', text: '  Verdict      ' },{ cls: 'green', text: 'CONFIRMÉ · Signal précoce COVID-19' },
    { cls: 'dim',    text: '  → CASSANDRE automatise cette méthode.' },
    { cls: 'dim',    text: '─────────────────────────────────────────' },
  ], delay: 70 },

  { type: 'blank', delay: 500 },

  { type: 'prompt', text: 'CASSANDRE > ', cmd: 'STATUS --targets', delay: 400 },
  { type: 'output', lines: [
    { cls: 'dim',    text: '─────────────────────────────────────────' },
    { cls: 'output', text: '  Cibles prioritaires :' },
    { cls: 'gold',   text: '  ·  Défense nationale' },
    { cls: 'gold',   text: '  ·  Renseignement (PJGN · DGSI)' },
    { cls: 'gold',   text: '  ·  Sécurité publique' },
    { cls: 'dim',    text: '' },
    { cls: 'green',  text: '  DISPONIBLE · Stage août 2026' },
    { cls: 'dim',    text: '─────────────────────────────────────────' },
  ], delay: 70 },

  { type: 'blank', delay: 400 },
  { type: 'idle' },
];

// ── Moteur de typage ─────────────────────────────────────────────────────────
let seqIdx = 0;
let totalDelay = 0;

function addLine(html, extraClass = '') {
  const div = document.createElement('div');
  div.className = 'line ' + extraClass;
  div.innerHTML = html;
  out.appendChild(div);
  cursorLine.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function typeText(element, text, speed, cb) {
  let i = 0;
  function tick() {
    if (i <= text.length) {
      element.innerHTML = text.slice(0, i);
      i++;
      setTimeout(tick, speed);
    } else if (cb) cb();
  }
  tick();
}

function processSequence() {
  if (seqIdx >= SEQUENCE.length) return;
  const step = SEQUENCE[seqIdx++];

  setTimeout(() => {
    if (step.type === 'blank') {
      addLine('');
      processSequence();
    }
    else if (step.type === 'idle') {
      // Curseur reste actif — rien à faire
    }
    else if (step.type === 'prompt') {
      const div = document.createElement('div');
      div.className = 'line';
      const promptSpan = document.createElement('span');
      promptSpan.className = 'prompt';
      promptSpan.textContent = step.text;
      const cmdSpan = document.createElement('span');
      cmdSpan.className = 'cmd';
      div.appendChild(promptSpan);
      div.appendChild(cmdSpan);
      out.appendChild(div);
      cursorLine.scrollIntoView({ behavior: 'smooth', block: 'end' });

      // Typage de la commande
      typeText(cmdSpan, step.cmd, 45, () => {
        setTimeout(processSequence, 300);
      });
    }
    else if (step.type === 'output') {
      let li = 0;
      function nextLine() {
        if (li >= step.lines.length) { processSequence(); return; }
        const l = step.lines[li++];
        // Ligne avec deux parties (label + valeur)
        if (step.lines[li - 1] && typeof l.text === 'string') {
          // Vérifier si la ligne suivante est une continuation (sans cls = fusion)
          const next = step.lines[li];
          if (next && !next.text.startsWith('  ') && li < step.lines.length) {
            // ligne simple
            addLine(`<span class="${l.cls}">${l.text}</span>`);
          } else {
            addLine(`<span class="${l.cls}">${l.text}</span>`);
          }
        }
        setTimeout(nextLine, step.delay);
      }
      nextLine();
    }
  }, step.type === 'prompt' ? 600 : 200);
}

// Ligne de boot
setTimeout(() => {
  addLine('<span class="dim">CASSANDRE v2.0 · INITIALISATION...</span>');
  addLine('<span class="dim">Ollama OK · Mistral 7B chargé · SQLite OK · Serveur :3000</span>');
  addLine('');
  setTimeout(processSequence, 800);
}, 500);
</script>
</body>
</html>
